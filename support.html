<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Support</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>📞 Customer Support</h1>
</header>

<section>

  <div class="card">
    <h2>📧 Email Support</h2>
    <p>Contact us at:</p>
    <p><b>bazzigartournament@gmail.com</b></p>
  </div>

  <div class="card">
    <h2>📱 Telegram Support</h2>
    <p>Chat with us on Telegram:</p>
    <p><b>@Bazzigartournaement</b></p>
  </div>

  <!-- OPTIONAL CONTACT FORM -->
  <div class="card">
    <h2>📝 Send Message</h2>

    <input type="text" id="name" placeholder="Your Name"><br><br>
    <input type="email" id="email" placeholder="Your Email"><br><br>
    <textarea id="message" placeholder="Your Message" style="width:100%; height:100px;"></textarea><br><br>

    <button onclick="sendMessage()">Send</button>
  </div>

</section>

<script>
function sendMessage() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  if (!name || !email || !message) {
    alert("Please fill all fields");
    return;
  }

  alert("✅ Message sent successfully!");
}
</script>

</body>
</html>
